ame: Build Beta Redesign

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build beta redesign
        run: node scripts/build-beta.js

      - name: Commit beta build
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add beta
          git diff --staged --quiet || git commit -m "Update beta redesign build"
          git push
