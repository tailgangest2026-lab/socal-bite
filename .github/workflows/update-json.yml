name: Update SoCal Bite JSON

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download JSON files
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzFGkQUXf5DXP8nFl0zMMRR2NVPbtfA8wwKalECNjBn-EEH1n0ImWfVEG3yCCRntUOw/exec"

          mkdir -p reports
          mkdir -p tmp-json

          download_json () {
            PAGE="$1"
            OUT="$2"
            TEMP="tmp-json/$(basename "$OUT")"

            URL="${BASE_URL}?page=${PAGE}"

            echo "Downloading $OUT"
            echo "URL: $URL"

            curl -L --fail --silent --show-error "$URL" -o "$TEMP"

            if jq empty "$TEMP" >/dev/null 2>&1; then
              mv "$TEMP" "$OUT"
              echo "Saved $OUT"
            else
              echo "Invalid JSON returned for $OUT"
              head -c 500 "$TEMP" || true
              rm -f "$TEMP"
              exit 1
            fi
          }

          download_json "landing-trip-types" "landing-trip-types.json"
          download_json "conditions" "conditions.json"
          download_json "landing-detail" "landing-detail.json"
          download_json "trip-prices" "trip-prices.json"
          download_json "landings" "landings.json"
          download_json "news" "news.json"
          download_json "bite-trends" "bite-trends.json"
          download_json "home" "home.json"
          download_json "boat-ratings" "boat-ratings.json"
          download_json "daily-report-index" "daily-report-index.json"

          TODAY=$(TZ="America/Los_Angeles" date +"%Y-%m-%d")
          YESTERDAY=$(TZ="America/Los_Angeles" date -d "1 day ago" +"%Y-%m-%d")
          TWO_DAYS=$(TZ="America/Los_Angeles" date -d "2 days ago" +"%Y-%m-%d")
          THREE_DAYS=$(TZ="America/Los_Angeles" date -d "3 days ago" +"%Y-%m-%d")

          for DATE in $TODAY $YESTERDAY $TWO_DAYS $THREE_DAYS
          do
            URL_PAGE="daily-report-date&date=$DATE"
            download_json "$URL_PAGE" "reports/daily-report-$DATE.json"
          done

          cp "reports/daily-report-$TODAY.json" "reports/daily-report-latest.json"

          rm -rf tmp-json

      - name: Debug latest daily report
        run: |
          echo "Latest report file:"
          ls -la reports/daily-report-latest.json || true

          echo "First 500 characters:"
          head -c 500 reports/daily-report-latest.json || true

          echo ""
          echo "JSON type:"
          jq type reports/daily-report-latest.json || true

          echo "Length:"
          jq length reports/daily-report-latest.json || true

      - name: Install Python packages
        run: pip install pillow

      - name: Detect new trips
        id: detect
        run: |
          python socials/detect_new_trips.py

          echo "Checking for alert flag..."

          if [ -f "socials/new-post-created.flag" ]; then
            echo "created=true" >> $GITHUB_OUTPUT
            echo "New post flag found"
          else
            echo "created=false" >> $GITHUB_OUTPUT
            echo "No new post flag found"
          fi

      - name: Debug new trip post files
        run: |
          echo "Socials folder:"
          ls -la socials || true

          echo "Output folder:"
          ls -la socials/output || true

          echo "Flag file:"
          ls -la socials/new-post-created.flag || true

          echo "Post links:"
          cat socials/post-links.txt || true

      - name: Send text alert if new social post was created
        if: steps.detect.outputs.created == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "SoCal Bite"
          to: ${{ secrets.SMS_TO }}
          from: "SoCal Bite Alerts"
          body: |
            New Fish Counts Added.
      - name: Email new social post links
        if: steps.detect.outputs.created == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "New SoCal Bite Fish Count Posts"
          to: ${{ secrets.EMAIL_TO }}
          from: "SoCal Bite Alerts"
          body: |
            New Fish Counts Added

            View generated images:

            https://thesocalbite.com/socials/output/

            Direct links may include:

            https://thesocalbite.com/socials/output/new-fish-counts-los-angeles.png
            https://thesocalbite.com/socials/output/new-fish-counts-orange-county.png
            https://thesocalbite.com/socials/output/new-fish-counts-san-diego.png

      - name: Show downloaded files
        run: |
          echo "Root JSON files:"
          ls -la *.json || true

          echo "Reports folder:"
          ls -la reports || true

          echo "Socials folder:"
          ls -la socials || true

          echo "Output folder:"
          ls -la socials/output || true

      - name: Commit updated JSON and trip tracking
        run: |
          set -x

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          git status

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update SoCal Bite JSON and trip tracking"
          git push
