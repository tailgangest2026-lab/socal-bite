name: Update SoCal Bite JSON

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download JSON files
        run: |
          BASE_URL="https://script.google.com/macros/s/AKfycbzFGkQUXf5DXP8nFl0zMMRR2NVPbtfA8wwKalECNjBn-EEH1n0ImWfVEG3yCCRntUOw/exec"

          mkdir -p reports

          curl -L "$BASE_URL?page=news" -o news.json
          curl -L "$BASE_URL?page=home" -o home.json
          curl -L "$BASE_URL?page=boat-ratings" -o boat-ratings.json
          curl -L "$BASE_URL?page=daily-report-index" -o daily-report-index.json

          TODAY=$(TZ="America/Los_Angeles" date +"%Y-%m-%d")
          YESTERDAY=$(TZ="America/Los_Angeles" date -d "1 day ago" +"%Y-%m-%d")
          TWO_DAYS=$(TZ="America/Los_Angeles" date -d "2 days ago" +"%Y-%m-%d")
          THREE_DAYS=$(TZ="America/Los_Angeles" date -d "3 days ago" +"%Y-%m-%d")

          for DATE in $TODAY $YESTERDAY $TWO_DAYS $THREE_DAYS
          do
            TEMP_FILE="tmp-daily-report-$DATE.json"
            OUT_FILE="reports/daily-report-$DATE.json"

            echo "Downloading $DATE"

            curl -L "$BASE_URL?page=daily-report-date&date=$DATE" -o "$TEMP_FILE"

            if jq empty "$TEMP_FILE" >/dev/null 2>&1; then
              mv "$TEMP_FILE" "$OUT_FILE"
              echo "Saved $OUT_FILE"
            else
              echo "Skipping $DATE because Apps Script did not return valid JSON"
              rm -f "$TEMP_FILE"
            fi
          done

      - name: Commit updated JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add news.json
          git add home.json
          git add boat-ratings.json
          git add daily-report-index.json
          git add reports/*.json

          if git diff --cached --quiet; then
            echo "No JSON changes to commit"
          else
            git commit -m "Update SoCal Bite JSON"
            git push
          fi
