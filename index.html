<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SoCal Bite | Southern California Fishing Reports</title>

  <meta
    name="description"
    content="SoCal Bite delivers Southern California fishing reports, top boats, top species, regional bite updates, and boat intelligence."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="home-page">

  <main class="full-bg-home">

    <nav class="floating-nav">
      <a href="daily-report.html">Daily Report</a>
      <a href="top-boats.html">Top Boats</a>
      <a href="top-species.html">Top Species</a>
      <a href="regional-reports.html">Regional Reports</a>
      <a href="about.html">About</a>

      <a href="https://www.instagram.com/the_socal_bite/" target="_blank">
        <img src="assets/instagram-icon.png" class="social-logo" alt="Instagram">
      </a>

      <a href="https://www.tiktok.com/@the_socal_bite" target="_blank">
        <img src="assets/tiktok-icon.png" class="social-logo" alt="TikTok">
      </a>
    </nav>

    <section class="live-dashboard">
      <div class="dash-card">
        <h2>Today's Top Boats By Region</h2>
        <div id="topBoats">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Today's Top Species By Region</h2>
        <div id="topSpecies">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Last Updated</h2>
        <div id="lastUpdated" class="updated-big">Loading...</div>
      </div>
    </section>

  </main>

  <script src="report-data.js"></script>

<script>
  getSoCalBiteData()
    .then(data => {
      const latest = data.reportsByDate[data.latestDate];
document.getElementById("debugData").textContent =
  JSON.stringify(latest, null, 2);
      const topBoatsBox = document.getElementById("topBoats");
      const topSpeciesBox = document.getElementById("topSpecies");
      const lastUpdatedBox = document.getElementById("lastUpdated");

      const regions = getRegions(latest);

      topBoatsBox.innerHTML = regions
        .map(region => {
          const boats = buildTopBoatsFromRegion(region).slice(0, 5);

          return `
            <div class="region-dash-block">
              <h3>${region.name}</h3>
              ${
                boats.length
                  ? boats.map((boat, index) => `
                      <div class="dash-row">
                        <span>${index + 1}. ${boat.name}</span>
                        <span>${boat.count}</span>
                      </div>
                    `).join("")
                  : `<div class="dash-muted">No boat data</div>`
              }
            </div>
          `;
        })
        .join("");

      topSpeciesBox.innerHTML = regions
        .map(region => {
          const species = buildTopSpeciesFromRegion(region).slice(0, 5);

          return `
            <div class="region-dash-block">
              <h3>${region.name}</h3>
              ${
                species.length
                  ? species.map((fish, index) => `
                      <div class="dash-row">
                        <span>${index + 1}. ${fish.name}</span>
                        <span>${fish.count}</span>
                      </div>
                    `).join("")
                  : `<div class="dash-muted">No species data</div>`
              }
            </div>
          `;
        })
        .join("");

      lastUpdatedBox.textContent =
        data.updatedAt || latest.updatedAt || "Not available";
    })
    .catch(error => {
      console.error("Dashboard load error:", error);

      document.getElementById("topBoats").innerHTML =
        `<div class="dash-muted">Unable to load boat data</div>`;

      document.getElementById("topSpecies").innerHTML =
        `<div class="dash-muted">Unable to load species data</div>`;

      document.getElementById("lastUpdated").textContent =
        "Unable to load";
    });


  function getRegions(latest) {
    if (!latest) return [];

    if (Array.isArray(latest.regions)) {
      return latest.regions.map(region => normalizeRegion(region));
    }

    if (latest.regions && typeof latest.regions === "object") {
      return Object.entries(latest.regions).map(([regionName, region]) => {
        return normalizeRegion({
          name: regionName,
          region: regionName,
          ...region
        });
      });
    }

    if (Array.isArray(latest.regionReports)) {
      return latest.regionReports.map(region => normalizeRegion(region));
    }

    return [];
  }


  function normalizeRegion(region) {
    return {
      name:
        region.region ||
        region.regionName ||
        region.name ||
        region.title ||
        "Region",

      raw: region,

      boats:
        region.topBoats ||
        region.boats ||
        region.boatTotals ||
        region.boatRankings ||
        region.top_boats ||
        [],

      species:
        region.topSpecies ||
        region.species ||
        region.fishTotals ||
        region.speciesTotals ||
        region.top_species ||
        [],

      trips:
        region.trips ||
        region.reports ||
        region.landings ||
        region.boatReports ||
        []
    };
  }


  function buildTopBoatsFromRegion(region) {
    const boatMap = {};

    region.boats.forEach(item => {
      const name =
        item.boat ||
        item.boatName ||
        item.name ||
        item.title ||
        item.vessel;

      const count =
        Number(item.totalFish) ||
        Number(item.count) ||
        Number(item.total) ||
        Number(item.fishCount) ||
        Number(item.quantity) ||
        0;

      if (!name || count <= 0) return;

      boatMap[name] = (boatMap[name] || 0) + count;
    });

    region.trips.forEach(item => {
      const name =
        item.boat ||
        item.boatName ||
        item.name ||
        item.title ||
        item.vessel;

      const count =
        Number(item.totalFish) ||
        Number(item.total) ||
        Number(item.count) ||
        Number(item.fishCount) ||
        Number(item.quantity) ||
        getFishTotalFromObject(item);

      if (!name || count <= 0) return;

      boatMap[name] = (boatMap[name] || 0) + count;
    });

    return Object.entries(boatMap)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count);
  }


  function buildTopSpeciesFromRegion(region) {
    const speciesMap = {};

    region.species.forEach(item => {
      const name =
        item.fish ||
        item.species ||
        item.name ||
        item.title ||
        item.fishName;

      const count =
        Number(item.count) ||
        Number(item.totalFish) ||
        Number(item.total) ||
        Number(item.quantity) ||
        0;

      if (!name || count <= 0) return;

      speciesMap[name] = (speciesMap[name] || 0) + count;
    });

    region.trips.forEach(item => {
      if (Array.isArray(item.fish)) {
        item.fish.forEach(fishItem => {
          const name =
            fishItem.fish ||
            fishItem.species ||
            fishItem.name ||
            fishItem.title;

          const count =
            Number(fishItem.count) ||
            Number(fishItem.total) ||
            Number(fishItem.quantity) ||
            0;

          if (!name || count <= 0) return;

          speciesMap[name] = (speciesMap[name] || 0) + count;
        });
      }

      Object.keys(item).forEach(key => {
        const ignoredKeys = [
          "region",
          "landing",
          "boat",
          "boatName",
          "tripType",
          "anglers",
          "date",
          "totalFish",
          "total",
          "count",
          "url"
        ];

        if (ignoredKeys.includes(key)) return;

        const value = Number(item[key]);

        if (!Number.isFinite(value) || value <= 0) return;

        const looksLikeFishColumn =
          key.toLowerCase().includes("tuna") ||
          key.toLowerCase().includes("bass") ||
          key.toLowerCase().includes("rockfish") ||
          key.toLowerCase().includes("yellowtail") ||
          key.toLowerCase().includes("whitefish") ||
          key.toLowerCase().includes("bonito") ||
          key.toLowerCase().includes("halibut") ||
          key.toLowerCase().includes("lingcod") ||
          key.toLowerCase().includes("sculpin") ||
          key.toLowerCase().includes("sheephead") ||
          key.toLowerCase().includes("barracuda");

        if (!looksLikeFishColumn) return;

        speciesMap[key] = (speciesMap[key] || 0) + value;
      });
    });

    return Object.entries(speciesMap)
      .map(([name, count]) => ({ name, count }))
      .sort((a, b) => b.count - a.count);
  }


  function getFishTotalFromObject(item) {
    const ignoredKeys = [
      "region",
      "landing",
      "boat",
      "boatName",
      "tripType",
      "anglers",
      "date",
      "url"
    ];

    return Object.entries(item)
      .filter(([key, value]) => {
        if (ignoredKeys.includes(key)) return false;
        const number = Number(value);
        return Number.isFinite(number) && number > 0;
      })
      .reduce((sum, [, value]) => sum + Number(value), 0);
  }
</script>

</body>
</html>
