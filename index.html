<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoCal Bite | Southern California Fishing Reports</title>
  <meta name="description" content="SoCal Bite delivers Southern California fishing reports, top boats, top species, regional bite updates, and boat intelligence." />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="home-page">

  <main class="full-bg-home">

    <nav class="floating-nav">
      <a href="daily-report.html">Daily Report</a>
      <a href="top-boats.html">Top Boats</a>
      <a href="top-species.html">Top Species</a>
      <a href="regional-reports.html">Regional Reports</a>
      <a href="about.html">About</a>

      <a href="https://www.instagram.com/the_socal_bite/" target="_blank">
        <img src="assets/instagram-icon.png" class="social-logo" alt="Instagram">
      </a>

      <a href="https://www.tiktok.com/@the_socal_bite" target="_blank">
        <img src="assets/tiktok-icon.png" class="social-logo" alt="TikTok">
      </a>
    </nav>

    
    <section class="live-dashboard">
      <div class="dash-card">
        <h2>Today's Top Boats By Region</h2>
        <div id="topBoats">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Today's Top Species By Region</h2>
        <div id="topSpecies">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Last Updated</h2>
        <div id="lastUpdated" class="updated-big">Loading...</div>
      </div>
    </section>

  </main>

  <script src="report-data.js"></script>

  <script>
  getSoCalBiteData().then(data => {
    const latest = data.reportsByDate[data.latestDate];

    const regions = latest.regions || latest.regionsData || {};

    document.getElementById("topBoats").innerHTML =
      Object.entries(regions)
        .map(([regionName, region]) => {
          const boats = (region.topBoats || [])
            .slice(0, 3)
            .map((b, i) => `
              <div class="dash-row">
                <span>#${i + 1} ${b.boat}</span>
                <span>${b.totalFish}</span>
              </div>
            `)
            .join("");

          return `
            <div class="region-dash-block">
              <h3>${regionName}</h3>
              ${boats || `<div class="dash-muted">No boat data</div>`}
            </div>
          `;
        })
        .join("");

    document.getElementById("topSpecies").innerHTML =
      Object.entries(regions)
        .map(([regionName, region]) => {
          const species = (region.topSpecies || [])
            .slice(0, 3)
            .map((s, i) => `
              <div class="dash-row">
                <span>#${i + 1} ${s.fish}</span>
                <span>${s.count}</span>
              </div>
            `)
            .join("");

          return `
            <div class="region-dash-block">
              <h3>${regionName}</h3>
              ${species || `<div class="dash-muted">No species data</div>`}
            </div>
          `;
        })
        .join("");

    document.getElementById("lastUpdated").textContent = data.updatedAt;
  });
</script>

</body>
</html>
