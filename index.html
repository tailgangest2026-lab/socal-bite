<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>SoCal Bite | Southern California Fishing Reports</title>

  <meta
    name="description"
    content="SoCal Bite delivers Southern California fishing reports, top boats, top species, regional bite updates, and boat intelligence."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="home-page">

  <main class="full-bg-home">

    <nav class="floating-nav">
      <a href="daily-report.html">Daily Report</a>
      <a href="top-boats.html">Top Boats</a>
      <a href="top-species.html">Top Species</a>
      <a href="regional-reports.html">Regional Reports</a>
      <a href="about.html">About</a>

      <a href="https://www.instagram.com/the_socal_bite/" target="_blank">
        <img src="assets/instagram-icon.png" class="social-logo" alt="Instagram">
      </a>

      <a href="https://www.tiktok.com/@the_socal_bite" target="_blank">
        <img src="assets/tiktok-icon.png" class="social-logo" alt="TikTok">
      </a>
    </nav>

    <section class="live-dashboard">
      <div class="dash-card">
        <h2>Today's Top Boats By Region</h2>
        <div id="topBoats">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Today's Top Species By Region</h2>
        <div id="topSpecies">Loading...</div>
      </div>

      <div class="dash-card">
        <h2>Last Updated</h2>
        <div id="lastUpdated" class="updated-big">Loading...</div>
      </div>
    </section>

  </main>

  <script src="report-data.js"></script>

  <script>
    getSoCalBiteData()
      .then(data => {
        const latest = data.reportsByDate[data.latestDate];
        const regions = latest.regions || [];

        const topBoatsBox = document.getElementById("topBoats");
        const topSpeciesBox = document.getElementById("topSpecies");
        const lastUpdatedBox = document.getElementById("lastUpdated");

        topBoatsBox.innerHTML = regions
          .map(region => {
            const boats = [];

            (region.landings || []).forEach(landing => {
              (landing.boats || []).forEach(boat => {
                boats.push({
                  name: boat.boat || "Unknown Boat",
                  count: Number(boat.totalFish) || 0
                });
              });
            });

            boats.sort((a, b) => b.count - a.count);

            return `
              <div class="region-dash-block">
                <h3>${region.region}</h3>

                ${
                  boats.length
                    ? boats.slice(0, 5).map((boat, index) => `
                        <div class="dash-row">
                          <span>${index + 1}. ${boat.name}</span>
                          <span>${boat.count.toLocaleString()}</span>
                        </div>
                      `).join("")
                    : `<div class="dash-muted">No boat data</div>`
                }
              </div>
            `;
          })
          .join("");

        topSpeciesBox.innerHTML = regions
          .map(region => {
            const speciesTotals = {};

            (region.landings || []).forEach(landing => {
              (landing.boats || []).forEach(boat => {
                (boat.fish || []).forEach(fish => {
                  const fishName = fish.fish || "Unknown Fish";
                  const fishCount = Number(fish.count) || 0;

                  speciesTotals[fishName] =
                    (speciesTotals[fishName] || 0) + fishCount;
                });
              });
            });

            const species = Object.entries(speciesTotals)
              .map(([fish, count]) => ({ fish, count }))
              .sort((a, b) => b.count - a.count)
              .slice(0, 5);

            return `
              <div class="region-dash-block">
                <h3>${region.region}</h3>

                ${
                  species.length
                    ? species.map((fish, index) => `
                        <div class="dash-row">
                          <span>${index + 1}. ${fish.fish}</span>
                          <span>${fish.count.toLocaleString()}</span>
                        </div>
                      `).join("")
                    : `<div class="dash-muted">No species data</div>`
                }
              </div>
            `;
          })
          .join("");

        lastUpdatedBox.textContent =
          data.updatedAt || latest.updatedAt || "Not available";
      })
      .catch(error => {
        console.error("Dashboard load error:", error);

        document.getElementById("topBoats").innerHTML =
          `<div class="dash-muted">Unable to load boat data</div>`;

        document.getElementById("topSpecies").innerHTML =
          `<div class="dash-muted">Unable to load species data</div>`;

        document.getElementById("lastUpdated").textContent =
          "Unable to load";
      });
  </script>

</body>
</html>
