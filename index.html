  </main>

  <section class="live-dashboard">

```
<div class="dash-card">
  <h2>Today's Top Boats</h2>
  <div id="topBoats">
    Loading...
  </div>
</div>

<div class="dash-card">
  <h2>Today's Top Species</h2>
  <div id="topSpecies">
    Loading...
  </div>
</div>

<div class="dash-card">
  <h2>Last Updated</h2>
  <div id="lastUpdated" class="updated-big">
    Loading...
  </div>
</div>
```

  </section>

  <script src="report-data.js"></script>

  <script>
    getSoCalBiteData().then(data => {

      const latest = data.reportsByDate[data.latestDate];

      document.getElementById("topBoats").innerHTML =
        latest.topBoats
          .slice(0, 5)
          .map((b, i) => `
            <div class="dash-row">
              <span>#${i + 1} ${b.boat}</span>
              <span>${b.totalFish}</span>
            </div>
          `)
          .join("");

      document.getElementById("topSpecies").innerHTML =
        latest.topSpecies
          .slice(0, 5)
          .map((s, i) => `
            <div class="dash-row">
              <span>#${i + 1} ${s.fish}</span>
              <span>${s.count}</span>
            </div>
          `)
          .join("");

      document.getElementById("lastUpdated").textContent =
        data.updatedAt;

    });
  </script>

</body>
